<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>For Tuguldur</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Georgia, 'Times New Roman', serif;
      background: #faf8f5;
      color: #3a3530;
      min-height: 100vh;
    }

    /* --- Password Gate --- */
    #gate {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 40px 20px;
    }

    #gate p {
      font-size: 1.1rem;
      color: #7a7068;
      margin-bottom: 28px;
      letter-spacing: 0.02em;
    }

    #gate input {
      border: none;
      border-bottom: 1px solid #c8c0b8;
      background: transparent;
      font-family: inherit;
      font-size: 1.1rem;
      color: #3a3530;
      padding: 8px 4px;
      width: 220px;
      text-align: center;
      outline: none;
      letter-spacing: 0.08em;
    }

    #gate input::placeholder {
      color: #c8c0b8;
      letter-spacing: 0.04em;
    }

    #gate button {
      margin-top: 28px;
      background: none;
      border: 1px solid #c8c0b8;
      font-family: inherit;
      font-size: 0.9rem;
      color: #7a7068;
      padding: 10px 36px;
      cursor: pointer;
      letter-spacing: 0.06em;
      transition: border-color 0.2s, color 0.2s;
    }

    #gate button:hover {
      border-color: #8a7e72;
      color: #3a3530;
    }

    #gate-error {
      margin-top: 18px;
      font-size: 0.85rem;
      color: #b07060;
      height: 18px;
    }

    /* --- Main Content --- */
    #main {
      display: none;
      padding: 60px 24px 80px;
      max-width: 960px;
      margin: 0 auto;
    }

    /* Family photo */
    #family-photo {
      width: 100%;
      margin-bottom: 72px;
    }

    #family-photo img {
      width: 100%;
      display: block;
    }

    /* Cards grid */
    #cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 48px 36px;
    }

    .card {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .card-photo {
      width: 100%;
      aspect-ratio: 1 / 1;
      background: #e8e2da;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card-photo span {
      font-size: 0.8rem;
      color: #b0a898;
      letter-spacing: 0.04em;
    }

    .card-name {
      font-size: 1rem;
      color: #3a3530;
      letter-spacing: 0.02em;
    }

    .card-message {
      font-size: 0.9rem;
      color: #9a8e82;
      line-height: 1.65;
      min-height: 48px;
    }
  </style>
</head>
<body>

  <!-- Password Gate -->
  <div id="gate">
    <p>enter the password to continue</p>
    <input type="password" id="pw-input" placeholder="password" autocomplete="off">
    <button onclick="checkPassword()">open</button>
    <div id="gate-error"></div>
  </div>

  <!-- Main Page -->
  <div id="main">

    <!-- Family photo -->
    <div id="family-photo">
      <img src="https://drive.google.com/uc?export=view&id=1tXj0iVsbFsRx4xDxZaLK83kUgE5zGbTo" alt="family photo">
    </div>

    <!-- Cards -->
    <div id="cards"></div>

  </div>

  <script>
    function checkPassword() {
      var val = document.getElementById('pw-input').value;
      if (val === 'tuguldur2003') {
        document.getElementById('gate').style.display = 'none';
        document.getElementById('main').style.display = 'block';
      } else {
        document.getElementById('gate-error').textContent = 'try again';
        document.getElementById('pw-input').value = '';
        document.getElementById('pw-input').focus();
      }
    }

    document.getElementById('pw-input').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') checkPassword();
    });

    // Build cards
    var container = document.getElementById('cards');
    for (var i = 1; i <= 20; i++) {
      var card = document.createElement('div');
      card.className = 'card';
      card.innerHTML =
        '<div class="card-photo"><span>photo</span></div>' +
        '<div class="card-name">Person ' + i + '</div>' +
        '<div class="card-message"></div>';
      container.appendChild(card);
    }
  </script>

</body>
</html>
